name: Dashboard CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard.yml"
      - "infra/.github/workflows/dashboard.yml"
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard.yml"
      - "infra/.github/workflows/dashboard.yml"

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://localhost:54321' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'ci-anon-key' }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN || '' }}
      NEXT_PUBLIC_ENV: test
      BACKEND_URL: http://localhost:8000
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: cd dashboard && npm ci
      - run: cd dashboard && npm audit --audit-level=moderate
      - run: cd dashboard && npm run lint
      - run: cd dashboard && npm run test
      - run: cd dashboard && npm run build
      - uses: amondnet/vercel-action@v25
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          env.VERCEL_TOKEN != '' &&
          env.VERCEL_ORG_ID != '' &&
          env.VERCEL_PROJECT_ID != ''
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          working-directory: ./dashboard
